<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live View | Hikvision Embedded Net DVR</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
    <style>
        :root {
            --hik-red: #D71920;
            --header-bg: #212121;
            --sidebar-bg: #ffffff;
            --text-main: #333333;
            --border-color: #dcdcdc;
            --grid-bg: #1a1a1a;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #ffffff;
            overflow: hidden; /* Evita scroll global */
            display: flex;
            flex-direction: column;
        }

        /* Header Superior */
        header {
            height: 48px;
            background-color: var(--header-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            z-index: 100;
            flex-shrink: 0;
        }

        .nav-left {
            display: flex;
            align-items: center;
            height: 100%;
        }

        .nav-logo {
            padding: 0 20px;
            height: 24px;
        }

        .nav-menu {
            display: flex;
            height: 100%;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-menu li {
            padding: 0 25px;
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 14px;
            height: 100%;
            transition: background 0.2s;
        }

        .nav-menu li.active {
            background-color: var(--hik-red);
        }

        .nav-menu li:hover:not(.active) {
            background-color: #333;
        }

        .nav-right {
            display: flex;
            align-items: center;
            padding-right: 15px;
            font-size: 13px;
        }

        .nav-right div {
            margin-left: 20px;
            cursor: pointer;
        }

        /* Contenedor Principal de 3 columnas */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            background-color: #f4f4f4;
        }

        /* Sidebar Izquierdo: Lista de Cámaras */
        .sidebar-left {
            width: 220px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-title {
            padding: 10px 15px;
            font-size: 12px;
            font-weight: bold;
            border-bottom: 1px solid var(--border-color);
            background: #f9f9f9;
        }

        .camera-list {
            flex: 1;
            overflow-y: auto;
            padding: 5px 0;
        }

        .camera-item {
            padding: 6px 15px;
            font-size: 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            color: var(--text-main);
        }

        .camera-item:hover {
            background-color: #e8f0fe;
        }

        .cam-icon {
            width: 14px;
            height: 14px;
            margin-right: 10px;
            vertical-align: middle;
        }

        /* Área Central: Video */
        .center-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2px;
            background: #444; 
            overflow: hidden;
        }

        .video-grid {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 1fr;   
            gap: 2px;
            background-color: #000;
        }

        .video-slot {
            background-color: var(--grid-bg);
            border: 1px solid #333;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .video-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        .video-slot.selected {
            border: 2px solid #ffcc00;
            z-index: 5;
        }

        .slot-label {
            position: absolute;
            top: 0;
            left: 0;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 3px 10px;
            font-size: 11px;
            z-index: 10;
            border-left: 3px solid var(--hik-red);
            text-transform: uppercase;
        }

        /* Barra de herramientas inferior */
        .bottom-bar {
            height: 35px;
            background: #ffffff;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            flex-shrink: 0;
        }

        .tool-group {
            display: flex;
            align-items: center;
        }

        .tool-btn {
            padding: 5px 10px;
            cursor: pointer;
            font-size: 12px;
            color: #333;
        }

        /* Sidebar Derecho: PTZ */
        .sidebar-right {
            width: 240px;
            background: var(--sidebar-bg);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .ptz-panel {
            padding: 15px;
        }

        .ptz-title {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        .ptz-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            width: 120px;
            margin: 0 auto;
        }

        .ptz-btn {
            width: 35px;
            height: 35px;
            background: #f5f5f5;
            border: 1px solid #ccc;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
        }

        .ptz-btn:hover {
            background: #e0e0e0;
        }

        /* Footer */
        footer {
            height: 25px;
            background: #f4f4f4;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #999;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-left">
            <img src="{{ url_for('static', filename='images/logo.png') }}" class="nav-logo" alt="HIKVISION" onerror="this.style.display='none'">
            <ul class="nav-menu">
                <li class="active">Live View</li>
                <li>Playback</li>
                <li>Configuration</li>
            </ul>
        </div>
        <div class="nav-right">
            <div>admin</div>
            <div onclick="location.href='/logout'">Logout</div>
        </div>
    </header>

    <div class="main-container">
        <!-- Sidebar Izquierdo -->
        <div class="sidebar-left">
            <div class="sidebar-title">Embedded Net DVR</div>
            <div class="camera-list">
                <script>
                    const iconPath = "{{ url_for('static', filename='images/favicon.ico') }}";
                    for(let i=1; i<=16; i++){
                        const camName = `Camera ${String(i).padStart(2, '0')}`;
                        document.write(`
                            <div class="camera-item">
                                <img src="${iconPath}" class="cam-icon" alt="ico">
                                ${camName}
                            </div>
                        `);
                    }
                </script>
            </div>
        </div>

        <!-- Área de Video Central -->
        <div class="center-content">
            <div class="video-grid">
                <!-- Cámara 01 (Stream Real) -->
                <div class="video-slot selected" id="slot-1">
                    <span class="slot-label">Camera 01 [LIVE]</span>
                    <img src="http://192.168.1.40/stream" alt="Esperando video..." onerror="this.src='{{ url_for('static', filename='images/camera-1.jpg') }}';">
                </div>

                <!-- Cámaras simuladas -->
                <div class="video-slot" id="slot-2">
                    <span class="slot-label">Camera 02</span>
                    <img src="{{ url_for('static', filename='images/camera-2.jpg') }}" alt="C2">
                </div>

                <div class="video-slot" id="slot-3">
                    <span class="slot-label">Camera 03</span>
                    <img src="{{ url_for('static', filename='images/camera-3.webp') }}" alt="C3">
                </div>

                <div class="video-slot" id="slot-4">
                    <span class="slot-label">Camera 04</span>
                    <img src="{{ url_for('static', filename='images/camera-4.jpg') }}" alt="C4">
                </div>
            </div>

            <div class="bottom-bar">
                <div class="tool-group">
                    <div class="tool-btn">Split Screen</div>
                </div>
                <div class="tool-group">
                    <div class="tool-btn">🔴 Record</div>
                    <div class="tool-btn">📸 Snapshot</div>
                </div>
            </div>
        </div>

        <!-- Sidebar Derecho -->
        <div class="sidebar-right">
            <div class="ptz-panel">
                <div class="ptz-title">PTZ Control</div>
                <div class="ptz-controls">
                    <div class="ptz-btn">↖</div><div class="ptz-btn">↑</div><div class="ptz-btn">↗</div>
                    <div class="ptz-btn">←</div><div class="ptz-btn">🔄</div><div class="ptz-btn">→</div>
                    <div class="ptz-btn">↙</div><div class="ptz-btn">↓</div><div class="ptz-btn">↘</div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        ©2025 Hikvision Digital Technology Co., Ltd. All Rights Reserved.
    </footer>

    <script>
        // Selección de cuadros de video
        const slots = document.querySelectorAll('.video-slot');
        slots.forEach(slot => {
            slot.addEventListener('click', () => {
                slots.forEach(s => s.classList.remove('selected'));
                slot.classList.add('selected');
            });
        });
    </script>
</body>
</html>
