<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Hikvision</title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="{{ url_for('static', filename='/images/favicon.ico') }}">
    <!-- El CSS que acabas de crear -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="header-top">
        <div class="logo"></div>
        <div class="lang-selector">
            <select>
                <option>Español</option>
                <option>English</option>
            </select>
        </div>
    </div>

    <div class="banner-wrapper">
        <!-- Composición de la cámara -->
        <img src="{{ url_for('static', filename='images/login.jpg') }}" class="camera-image" alt="Camera Composition">

        <!-- Formulario de captura -->
        <div class="login-box">
            <form action="/login" method="POST">
                <div class="input-group">
                    <i class="icon-user"></i>
                    <input type="text" name="username" class="login-input" placeholder="Nombre de usuario" required autocomplete="off">
                </div>
                
                <div class="input-group">
                    <i class="icon-pass"></i>
                    <input type="password" name="password" class="login-input" placeholder="Contraseña" required>
                </div>

                <button type="submit" class="login-btn">Iniciar sesión</button>
                
                <div class="privacy-tip">
                    Respete la privacidad y los derechos de las otras personas al utilizar este producto.
                </div>
            </form>
        </div>
    </div>

    <div class="footer">
        ©2025 Hikvision Digital Technology Co., Ltd. All Rights Reserved.
    </div>

</body>
</html>
